name: Backfill Power Ranking History

# Nur manuell auslösbar - kein Zeitplan, da einmaliger Vorgang
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python-Abhängigkeiten installieren
        run: pip install requests pandas

      - name: Backfill-Script ausführen
        run: python backfill_history.py

      - name: Historie committen
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Backfill: Power-Ranking-Historie der letzten zwei Saisons"
          file_pattern: "public/history"
